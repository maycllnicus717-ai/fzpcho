<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости — ФЗПЧО</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #a855f7;
            --glass: rgba(18, 28, 46, 0.4);
            --text: #e0f2fe;
            --dark: #0b0e1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; line-height: 1.6; }
        h1, h2, h3, .logo { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        a { color: var(--primary); text-decoration: none; }
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; padding: 12px 32px; border-radius: 100px; border: none; font-weight: 700; cursor: pointer;
        }
        header {
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; gap: 20px;
        }
        .logo { font-size: 1.8rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        nav a { margin: 0 15px; font-weight: 500; font-size: 1.1rem; }
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 60px; color: #5a7a94; }
    </style>
</head>
<body>

    <header>
        <div class="logo">❄️ ФЗПЧО</div>
        <nav>
            <a href="index.html">О нас</a>
            <a href="news.html">Новости</a>
            <a href="calendar.html">Календарь</a>
            <a href="results.html">Результаты</a>
            <a href="documents.html">Документы</a>
            <a href="index.html#contacts">Контакты</a>
        </nav>
        <a href="index.html#join" class="btn">Вступить</a>
    </header>

    <main style="text-align: center; padding: 80px 20px;">
        <h2 style="font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-bottom: 20px; background: linear-gradient(135deg, #00d4ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Новости</h2>
        <p style="font-size: 1.3rem; color: #aac4d9; max-width: 600px; margin: 0 auto;">Информация будет добавлена после проведения первых мероприятий.</p>
    </main>

    <footer>
        <p>© 2026 Федерация зимнего плавания Челябинской области</p>
    </footer>

</body>
</html>
