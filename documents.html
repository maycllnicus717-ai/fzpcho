<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документы — ФЗПЧО</title>
    <!-- Подключаем стили (скопируйте их из index.html) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Скопируйте сюда стили из index.html */
        :root {
            --primary: #00d4ff;
            --secondary: #a855f7;
            --glass: rgba(18, 28, 46, 0.4);
            --glass-border: rgba(100, 220, 255, 0.15);
            --text: #e0f2fe;
            --dark: #0b0e1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; line-height: 1.6; }
        .logo { font-family: 'Orbitron'; font-size: 1.8rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; gap: 20px; }
        nav a { margin: 0 15px; font-weight: 500; font-size: 1.1rem; color: var(--primary); text-decoration: none; }
        nav a:hover { color: var(--secondary); }
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; padding: 12px 32px; border-radius: 100px; border: none; font-weight: 700; cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { transform: scale(1.02); }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; }
        .section-title { font-size: 2.5rem; margin-bottom: 30px; text-align: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--glass-border); margin-top: 60px; color: #5a7a94; }
        .document-list { display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; }
        .doc-item { background: var(--glass); padding: 20px 25px; border-radius: 16px; border-left: 4px solid var(--primary); }
        .doc-item h3 { font-size: 1.3rem; margin-bottom: 5px; }
        .doc-item a { color: var(--primary); text-decoration: none; }
        .doc-item a:hover { text-decoration: underline; }
        @media (max-width: 768px) { header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">❄️ ФЗПЧО</div>
        <nav>
            <a href="index.html">О нас</a>
            <a href="news.html">Новости</a>
            <a href="calendar.html">Календарь</a>
            <a href="results.html">Результаты</a>
            <a href="documents.html">Документы</a>
            <a href="index.html#contacts">Контакты</a>
        </nav>
        <a href="index.html#join" class="btn">Вступить</a>
    </header>

    <main style="max-width: 1200px; margin: 60px auto; padding: 0 20px;">
        <h2 class="section-title">Документы</h2>
        <div class="document-list">
            <!-- Здесь будут ссылки на ваши PDF-файлы -->
            <div class="doc-item">
                <h3>📄 Устав Федерации зимнего плавания Челябинской области</h3>
                <p><a href="docs/ustav.pdf" target="_blank">Скачать PDF</a> (1.2 МБ)</p>
            </div>
            <!-- Добавьте другие документы сюда по аналогии -->
        </div>
    </main>

    <footer>
        <p>© 2026 Федерация зимнего плавания Челябинской области</p>
    </footer>

</body>
</html>
